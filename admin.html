<!doctype html>
<html lang="bn">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Admin Dashboard — ইফতার খুঁজুন</title>
  <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    body{font-family:'Hind Siliguri',sans-serif;margin:16px;background:#f4f6f5;color:#111}
    h2,h3{margin:10px 0}
    .bar{display:flex;gap:10px;align-items:center;flex-wrap:wrap}
    button{border:0;border-radius:12px;padding:10px 12px;font-weight:800;cursor:pointer}
    .ok{background:#1e7f43;color:#fff}
    .no{background:#c0392b;color:#fff}
    .soft{background:#e5e7eb;color:#111}
    .card{background:#fff;border-radius:14px;padding:12px;margin:10px 0;box-shadow:0 10px 20px rgba(0,0,0,.08)}
    .muted{opacity:.8;font-size:12px;font-weight:700}
    .grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:10px}
    @media (max-width:600px){ .grid{grid-template-columns:1fr} }
    .row{display:flex;gap:10px;flex-wrap:wrap;margin-top:10px}
    .pill{display:inline-block;background:#f3f4f6;border-radius:999px;padding:6px 10px;font-weight:800;font-size:12px;margin-right:6px;margin-top:6px}
    .mono{font-family:ui-monospace, Menlo, Consolas, monospace;}
    a{color:#1e7f43;text-decoration:none;font-weight:900}
  </style>
</head>

<body>
  <h2>Admin Dashboard</h2>

  <div class="bar">
    <button id="login" class="ok">Google Login</button>
    <button id="logout" class="soft">Logout</button>
    <a href="./index.html">← Public Site</a>
  </div>

  <div class="card">
    <div class="muted">Status</div>
    <div id="statusText">Not logged in</div>
    <div class="muted">UID: <span class="mono" id="uidText">—</span></div>
    <div class="muted">Email: <span class="mono" id="emailText">—</span></div>
    <div class="muted">Admin Check: <span id="adminText">—</span></div>
  </div>

  <div class="grid">
    <div class="card"><b>Pending</b><div class="muted" id="mPending">0</div></div>
    <div class="card"><b>Approved</b><div class="muted" id="mApproved">0</div></div>
    <div class="card"><b>Reports</b><div class="muted" id="mReports">0</div></div>
    <div class="card"><b>Total Visits</b><div class="muted" id="mVisits">0</div></div>
  </div>

  <h3>Pending Queue</h3>
  <div id="pending"></div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js";
    import {
      getFirestore, collection, onSnapshot, doc, getDoc,
      setDoc, deleteDoc, serverTimestamp
    } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore.js";

    import {
      getAuth, GoogleAuthProvider, signInWithPopup, signOut, onAuthStateChanged
    } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-auth.js";

    const firebaseConfig = {
      apiKey: "AIzaSyA6SZeKVmNAsd4eAlieCTC7zQzYMenwJEA",
      authDomain: "free-ifter.firebaseapp.com",
      projectId: "free-ifter",
      storageBucket: "free-ifter.firebasestorage.app",
      messagingSenderId: "380765313810",
      appId: "1:380765313810:web:6b7a87bf350cba858f71cb",
      measurementId: "G-18J6SR9913"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);
    const provider = new GoogleAuthProvider();

    const loginBtn = document.getElementById("login");
    const logoutBtn = document.getElementById("logout");
    const statusText = document.getElementById("statusText");
    const uidText = document.getElementById("uidText");
    const emailText = document.getElementById("emailText");
    const adminText = document.getElementById("adminText");
    const pendingEl = document.getElementById("pending");

    const mPending = document.getElementById("mPending");
    const mApproved = document.getElementById("mApproved");
    const mReports = document.getElementById("mReports");
    const mVisits = document.getElementById("mVisits");

    let currentUser = null;
    let isAdmin = false;

    loginBtn.onclick = async () => { await signInWithPopup(auth, provider); };
    logoutBtn.onclick = async () => { await signOut(auth); };

    onSnapshot(collection(db,"spots_pending"), (snap)=>{ mPending.textContent = snap.size; });
    onSnapshot(collection(db,"spots_approved"), (snap)=>{ mApproved.textContent = snap.size; });
    onSnapshot(collection(db,"reports"), (snap)=>{ mReports.textContent = snap.size; });
    onSnapshot(doc(db,"stats","global"), (snap)=>{ mVisits.textContent = snap.exists()? (snap.data().totalVisits||0):0; });

    onAuthStateChanged(auth, async (u) => {
      currentUser = u;
      isAdmin = false;

      if (!u) {
        statusText.textContent = "Not logged in";
        uidText.textContent = "—";
        emailText.textContent = "—";
        adminText.textContent = "—";
        pendingEl.innerHTML = `<div class="card"><b>Login করুন</b></div>`;
        return;
      }

      statusText.textContent = "Logged in ✅";
      uidText.textContent = u.uid;
      emailText.textContent = u.email || "—";

      const adminSnap = await getDoc(doc(db,"admins", u.uid));
      isAdmin = adminSnap.exists();
      adminText.textContent = isAdmin ? "✅ Admin OK" : "❌ Not Admin";

      if (!isAdmin){
        pendingEl.innerHTML = `<div class="card"><b>Admin access নেই</b><div class="pill mono">${u.uid}</div></div>`;
      }
    });

    // Render pending queue
    onSnapshot(collection(db,"spots_pending"), async (snap) => {
      if (!currentUser || !isAdmin) return;

      pendingEl.innerHTML = "";
      if (snap.empty){
        pendingEl.innerHTML = `<div class="card"><b>✅ Pending নেই</b></div>`;
        return;
      }

      snap.forEach((d) => {
        const s = d.data() || {};
        const id = d.id;

        const latNum = Number(s.lat);
        const lngNum = Number(s.lng);
        const latTxt = Number.isFinite(latNum) ? latNum.toFixed(5) : "N/A";
        const lngTxt = Number.isFinite(lngNum) ? lngNum.toFixed(5) : "N/A";

        const div = document.createElement("div");
        div.className = "card";
        div.innerHTML = `
          <b>${esc(s.name||"")}</b>
          <div class="muted">${esc(s.area||"")} • ${esc(s.type||"")}</div>
          <div class="row">
            <span class="pill">lat: ${latTxt}</span>
            <span class="pill">lng: ${lngTxt}</span>
            <span class="pill mono">Doc: ${id}</span>
          </div>
          <div class="row">
            <button class="ok" data-id="${id}" data-act="approve">Approve</button>
            <button class="no" data-id="${id}" data-act="reject">Reject</button>
          </div>
        `;
        pendingEl.appendChild(div);
      });
    });

    pendingEl.addEventListener("click", async (e) => {
      const btn = e.target.closest("button");
      if (!btn) return;
      if (!currentUser || !isAdmin) return alert("Admin login করুন");

      const id = btn.dataset.id;
      const act = btn.dataset.act;

      const pendingRef = doc(db,"spots_pending", id);

      try{
        if (act === "approve"){
          const snap = await getDoc(pendingRef);
          const data = snap.data();
          if (!data) return alert("Pending ডাটা নেই");

          await setDoc(doc(db,"spots_approved", id), {
            ...data,
            status:"approved",
            truthCount: 0,
            fakeCount: 0,
            approvedBy: currentUser.uid,
            approvedAt: serverTimestamp()
          });

          await deleteDoc(pendingRef);
          alert("✅ Approved & Live!");
        } else {
          await deleteDoc(pendingRef);
          alert("🗑️ Rejected");
        }
      }catch(err){
        console.error(err);
        alert("❌ " + (err?.message||""));
      }
    });

    function esc(t){
      return String(t).replaceAll("&","&amp;").replaceAll("<","&lt;").replaceAll(">","&gt;");
    }
  </script>
</body>
</html>

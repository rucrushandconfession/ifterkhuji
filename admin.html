<!doctype html>
<html lang="bn">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Admin Dashboard — ইফতার খুঁজুন</title>
  <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;600;700&display=swap" rel="stylesheet">

  <style>
    body{font-family:'Hind Siliguri',sans-serif;margin:16px;background:#f4f6f5;color:#111}
    h2,h3{margin:10px 0}
    .bar{display:flex;gap:10px;align-items:center;flex-wrap:wrap}
    button{border:0;border-radius:12px;padding:10px 12px;font-weight:800;cursor:pointer}
    .ok{background:#1e7f43;color:#fff}
    .no{background:#c0392b;color:#fff}
    .card{background:#fff;border-radius:14px;padding:12px;margin:10px 0;box-shadow:0 10px 20px rgba(0,0,0,.08)}
    .muted{opacity:.75;font-size:12px;font-weight:700}
    .pill{display:inline-block;background:#f3f4f6;border-radius:999px;padding:6px 10px;font-weight:800;font-size:12px;margin-right:6px;margin-top:6px}
    .grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:10px}
    @media (max-width:600px){ .grid{grid-template-columns:1fr} }
    .row{display:flex;gap:10px;flex-wrap:wrap;margin-top:10px}
    a{color:#1e7f43;text-decoration:none;font-weight:800}
  </style>
</head>

<body>
  <h2>Admin Dashboard</h2>

  <div class="bar">
    <button id="login" class="ok">Google Login</button>
    <span class="muted" id="who">Not logged in</span>
    <a href="./index.html">← Public Site</a>
  </div>

  <div class="grid" style="margin-top:12px;">
    <div class="card"><b>Pending</b><div class="muted" id="mPending">0</div></div>
    <div class="card"><b>Approved</b><div class="muted" id="mApproved">0</div></div>
    <div class="card"><b>Reports Total</b><div class="muted" id="mReports">0</div></div>
    <div class="card"><b>Total Visits</b><div class="muted" id="mVisits">0</div></div>
    <div class="card"><b>Online Now</b><div class="muted" id="mOnline">0</div></div>
    <div class="card"><b>Top Areas</b><div class="muted" id="mAreas">—</div></div>
  </div>

  <h3>Pending Queue</h3>
  <div id="pending"></div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js";
    import {
      getFirestore, collection, onSnapshot, doc, getDoc, setDoc, deleteDoc, serverTimestamp
    } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore.js";

    import {
      getAuth, GoogleAuthProvider, signInWithPopup, onAuthStateChanged
    } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-auth.js";

    // ✅ Same Firebase config
    const firebaseConfig = {
      apiKey: "AIzaSyA6SZeKVmNAsd4eAlieCTC7zQzYMenwJEA",
      authDomain: "free-ifter.firebaseapp.com",
      projectId: "free-ifter",
      storageBucket: "free-ifter.firebasestorage.app",
      messagingSenderId: "380765313810",
      appId: "1:380765313810:web:6b7a87bf350cba858f71cb",
      measurementId: "G-18J6SR9913"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);
    const provider = new GoogleAuthProvider();

    const loginBtn = document.getElementById("login");
    const who = document.getElementById("who");
    const pendingEl = document.getElementById("pending");

    const mPending = document.getElementById("mPending");
    const mApproved = document.getElementById("mApproved");
    const mReports = document.getElementById("mReports");
    const mVisits = document.getElementById("mVisits");
    const mOnline = document.getElementById("mOnline");
    const mAreas = document.getElementById("mAreas");

    let user = null;

    loginBtn.onclick = async () => {
      try { await signInWithPopup(auth, provider); }
      catch (e) { alert("Login cancel/failed"); }
    };

    onAuthStateChanged(auth, async (u) => {
      user = u;
      who.textContent = user ? `Logged: ${user.email || user.uid}` : "Not logged in";
    });

    // Counters
    onSnapshot(collection(db,"spots_pending"), (snap)=>{ mPending.textContent = snap.size; });

    onSnapshot(collection(db,"spots_approved"), (snap)=>{
      mApproved.textContent = snap.size;

      const counts = {};
      snap.forEach(d=>{
        const a = (d.data()?.area || "Unknown").trim();
        counts[a] = (counts[a]||0) + 1;
      });

      const top = Object.entries(counts).sort((a,b)=>b[1]-a[1]).slice(0,5);
      mAreas.textContent = top.length ? top.map(([k,v])=>`${k} (${v})`).join(" • ") : "—";
    });

    onSnapshot(collection(db,"reports"), (snap)=>{ mReports.textContent = snap.size; });
    onSnapshot(doc(db,"stats","global"), (snap)=>{ mVisits.textContent = Number(snap.data()?.totalVisits || 0); });

    onSnapshot(collection(db,"presence"), (snap)=>{
      const now = Date.now();
      let online = 0;
      snap.forEach(d=>{
        const ms = d.data()?.lastSeen?.toMillis ? d.data().lastSeen.toMillis() : 0;
        if (ms && now - ms <= 2*60*1000) online++;
      });
      mOnline.textContent = online;
    });

    // Pending list + Approve/Reject
    onSnapshot(collection(db, "spots_pending"), async (snap) => {
      pendingEl.innerHTML = "";

      if (!user) {
        pendingEl.innerHTML = `<div class="card"><b>Login করুন</b><div class="muted">Google login করে approve/reject করুন</div></div>`;
        return;
      }

      const adminSnap = await getDoc(doc(db,"admins", user.uid));
      if (!adminSnap.exists()) {
        pendingEl.innerHTML = `<div class="card"><b>❌ Admin নয়</b><div class="muted">Firestore এ admins/${user.uid} doc তৈরি করুন</div></div>`;
        return;
      }

      if (snap.empty) {
        pendingEl.innerHTML = `<div class="card"><b>✅ Pending নেই</b></div>`;
        return;
      }

      snap.forEach((d) => {
        const s = d.data();
        const div = document.createElement("div");
        div.className = "card";
        div.innerHTML = `
          <b>${escapeHtml(s.name)}</b>
          <div class="muted">${escapeHtml(s.area)} • ${escapeHtml(s.type)}</div>
          <div class="row">
            <span class="pill">lat: ${Number(s.lat).toFixed(5)}</span>
            <span class="pill">lng: ${Number(s.lng).toFixed(5)}</span>
          </div>
          <div class="row">
            <button class="ok" data-id="${d.id}" data-act="approve">Approve</button>
            <button class="no" data-id="${d.id}" data-act="reject">Reject</button>
          </div>
        `;
        pendingEl.appendChild(div);
      });
    });

    pendingEl.addEventListener("click", async (e) => {
      const btn = e.target.closest("button");
      if (!btn) return;

      if (!user) return alert("Login করুন।");
      const adminSnap = await getDoc(doc(db,"admins", user.uid));
      if (!adminSnap.exists()) return alert("Admin নয়।");

      const id = btn.dataset.id;
      const act = btn.dataset.act;

      const pendingRef = doc(db, "spots_pending", id);

      if (act === "approve") {
        const snap = await getDoc(pendingRef);
        const data = snap.data();
        if (!data) return;

        // ✅ Move to approved (same doc id)
        await setDoc(doc(db, "spots_approved", id), {
          ...data,
          status: "approved",
          truthCount: 0,
          fakeCount: 0,
          reportsCount: 0,
          approvedBy: user.uid,
          approvedAt: serverTimestamp()
        });

        await deleteDoc(pendingRef);
        alert("✅ Approved & Live!");
      }

      if (act === "reject") {
        await deleteDoc(pendingRef);
        alert("🗑️ Rejected");
      }
    });

    function escapeHtml(str) {
      return String(str || "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }
  </script>
</body>
</html>

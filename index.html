<!doctype html>
<html lang="bn">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>রাজশাহী ইফতার</title>

  <!-- Bangla Font: Hind Siliguri -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;600;700&display=swap" rel="stylesheet">

  <!-- Leaflet CSS -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

  <!-- Your CSS -->
  <link rel="stylesheet" href="./style.css" />
</head>

<body>

  <!-- Top Bar (Minimal) -->
  <header class="topbar">
    <div class="brand">🌙 রাজশাহী ইফতার</div>

    <div class="countdownPill">
      <span class="label">ইফতার বাকি</span>
      <span id="countdown" class="time">--</span>
    </div>
  </header>

  <!-- Map -->
  <div id="map"></div>

  <!-- Bottom Sheet -->
  <section id="sheet" class="sheet" aria-label="আজকের সক্রিয় ইফতার">
    <div id="sheetHandle" class="sheetHandle" aria-label="drag handle"></div>

    <div class="sheetHeader">
      <div class="sheetTitle">🍽️ আজকের সক্রিয় ইফতার</div>
      <div class="sheetMeta"><span id="spotCount">0</span>টি</div>
    </div>

    <!-- List (Cards will render here from app.js) -->
    <div id="list" class="list">
      <div class="empty">কোনো স্পট নেই</div>
    </div>
  </section>

  <!-- Leaflet JS -->
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <!-- IMPORTANT: app.js must be type="module" because it imports firebase modules -->
  <script type="module" src="./app.js"></script>

</body>
</html>

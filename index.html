<!doctype html>
<html lang="bn">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>ইফতার খুঁজুন</title>

  <!-- Leaflet -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css">
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css">

  <link rel="stylesheet" href="./style.css" />
</head>

<body>
  <div class="topbar">
    <button id="btnFind" class="pill pill-ghost"><span class="moon">🌙</span> ইফতার খুঁজুন</button>

    <div class="search">
      <span class="icon">🔎</span>
      <input id="q" placeholder="মসজিদ/এলাকা/ট" />
    </div>

    <button id="btnGPS" class="pill pill-solid">📍 GPS</button>
  </div>

  <div class="chips">
    <button class="chip active" data-filter="all">সব</button>
    <button class="chip" data-filter="mix">মিক্স</button>
    <button class="chip" data-filter="khichuri">খিচুড়ি</button>
    <button class="chip" data-filter="biriyani">বিরিয়ানি</button>
    <button class="chip" data-filter="truthy">সত্যি বেশি</button>
  </div>

  <div class="statsRow">
    <div class="statPill">🌙 লাইভ: <span id="liveCount">0</span></div>
    <div class="statPill">🕒 সময়: <span id="clock">--</span></div>
  </div>

  <div id="map"></div>

  <button id="fabAdd" class="fab">＋</button>

  <!-- Bottom Sheet -->
  <div id="sheet" class="sheet">
    <div class="sheetHandle"></div>

    <div class="sheetHeader">
      <div class="sheetTitle">🌙 আজকের সক্রিয় স্পট</div>
      <select id="sort" class="select">
        <option value="recent">সর্বশেষ</option>
        <option value="truth">সত্যি বেশি</option>
      </select>
    </div>

    <div id="todayList" class="todayList">
      <div class="empty">কোনো স্পট পাওয়া যায়নি</div>
    </div>

    <div class="credit">Developed by RU Crush and Confession</div>

    <div class="miniRow">
      <div class="mini">👁️ Visits: <span id="visits">0</span></div>
      <div class="mini">🟢 Online: <span id="online">0</span></div>
    </div>
  </div>

  <!-- Add Spot Modal -->
  <div id="modal" class="modal hidden">
    <div class="modalCard">
      <div class="modalTitle">স্পট যোগ করুন</div>

      <label>স্পট/মসজিদের নাম *</label>
      <input id="name" placeholder="উদাহরণ: Kazla Mosque" />

      <label>এলাকা/পয়েন্ট *</label>
      <input id="area" placeholder="উদাহরণ: kazla" />

      <label>ইফতারের ধরন *</label>
      <select id="type">
        <option value="mix">মিক্স ইফতার</option>
        <option value="khichuri">খিচুড়ি</option>
        <option value="biriyani">বিরিয়ানি</option>
      </select>

      <label>আইটেম (ঐচ্ছিক)</label>
      <input id="items" placeholder="বেগুনি, ছোলা, হালিম..." />

      <label>নোট (ঐচ্ছিক)</label>
      <input id="notes" placeholder="সময়/দাম/অন্য তথ্য" />

      <div class="locRow">
        <div>📍 <span id="latlng">Map থেকে দিন</span></div>
        <button id="btnPick" class="pill pill-ghost">Map থেকে দিন</button>
      </div>

      <button id="btnSubmit" class="btnSubmit">Submit</button>
      <button id="btnClose" class="btnClose">বন্ধ</button>

      <div class="hint">⚠️ রাজশাহীর ভেতরের লোকেশন দিন, নাহলে সাবমিট হবে না।</div>
    </div>
  </div>

  <!-- libs -->
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>

  <script type="module" src="./app.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="bn">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>রাজশাহী ইফতার</title>

  <!-- Font -->
  <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;500;600;700&display=swap" rel="stylesheet">

  <!-- Leaflet -->
  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
  />

  <!-- App Style -->
  <link rel="stylesheet" href="style.css" />
</head>

<body>

  <!-- 🌙 Top Header -->
  <div class="topHeader">
    🌙 রাজশাহী ইফতার
  </div>

  <!-- 🗺️ Map -->
  <div id="map"></div>

  <!-- ➕ Add Spot Floating Button -->
  <button id="addSpotFab">＋</button>

  <!-- 📍 Add Spot Modal -->
  <div id="addSpotModal" class="modal hidden">
    <div class="modalCard">

      <div class="modalHeader">
        <div>
          <div class="mhTitle">📍 ইফতার স্পট যোগ করুন</div>
          <div class="mhSub">উম্মাকে ইফতার খুঁজে পেতে সাহায্য করুন</div>
        </div>
        <button id="closeModal" class="mhClose">✕</button>
      </div>

      <div class="modalBody">
        <label>স্পট / মসজিদের নাম *</label>
        <input id="spotName" placeholder="উদাহরণ: কাজলা জামে মসজিদ" />

        <label>এলাকা *</label>
        <input id="spotArea" placeholder="উদাহরণ: কাজলা, রাজশাহী" />

        <div class="pickRow">
          <button id="pickLocationBtn">📍 ম্যাপ থেকে লোকেশন দিন</button>
          <div id="pickedLatLng">লোকেশন নির্বাচন হয়নি</div>
        </div>

        <button id="submitSpotBtn" class="submitBtn">
          স্পট যোগ করুন
        </button>
      </div>

    </div>
  </div>

  <!-- 📜 Bottom Sheet -->
  <div id="bottomSheet">
    <div class="sheetHandle"></div>
    <div class="sheetHeader">
      🍽️ আজকের সক্রিয় ইফতার
    </div>
    <div id="spotList" class="sheetList">
      <div class="empty">কোনো স্পট নেই</div>
    </div>
  </div>

  <!-- Leaflet JS -->
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <!-- App Logic -->
  <script type="module" src="app.js"></script>

</body>
</html>

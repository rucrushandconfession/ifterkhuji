<!doctype html>
<html lang="bn">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover"/>
  <title>ইফতার খুঁজুন — RU</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;600;700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
  <link rel="stylesheet" href="./style.css"/>

  <meta name="theme-color" content="#14532d">
</head>

<body>
  <div id="map"></div>

  <!-- Top Bar -->
  <div class="topbar">
    <button class="brand" id="openAdd">
      🌙 <span>ইফতার খুঁজুন</span>
    </button>

    <div class="searchWrap">
      <span class="icon">🔎</span>
      <input id="q" type="search" placeholder="মসজিদ/এলাকা/টাইপ খুঁজুন" autocomplete="off"/>
    </div>

    <button class="gps" id="btnGPS">📍 GPS</button>
  </div>

  <!-- Filter Chips -->
  <div class="chips">
    <button class="chip active" data-filter="all">সব</button>
    <button class="chip" data-filter="mix">মিক্স</button>
    <button class="chip" data-filter="khichuri">খিচুড়ি</button>
    <button class="chip" data-filter="biriyani">বিরিয়ানি</button>
    <button class="chip" data-filter="truth">সত্যি বেশি</button>
  </div>

  <!-- Stats Pills -->
  <div class="pills">
    <span class="pill">🌙 লাইভ: <b id="liveCount">0</b></span>
    <span class="pill">⏳ Pending: <b id="pendingCount">0</b></span>
    <span class="pill">🕒 <b id="iftarText">ইফতার টাইম…</b></span>
  </div>

  <!-- Bottom Sheet -->
  <div class="sheet" id="sheet">
    <div class="grab" id="grab"></div>

    <div class="sheetHead">
      <div class="title">🌙 আজকের সক্রিয় স্পট</div>
      <div class="sort">
        <select id="sort">
          <option value="new">সর্বশেষ</option>
          <option value="near">কাছাকাছি</option>
          <option value="truth">সত্যি বেশি</option>
        </select>
      </div>
    </div>

    <div class="list" id="list"></div>
  </div>

  <!-- Add Modal -->
  <div class="modal" id="modal">
    <div class="card">
      <div class="cardHead">
        <div>
          <div class="cardTitle">ইফতার স্পট যোগ করুন</div>
          <div class="cardSub">Submit করলে Pending হবে → Admin approve করলে লাইভ</div>
        </div>
        <button class="x" id="closeModal">✕</button>
      </div>

      <label class="lbl">স্পট/মসজিদের নাম *</label>
      <input class="inp" id="name" placeholder="যেমন: রাজশাহী বিশ্ববিদ্যালয় কেন্দ্রীয় মসজিদ"/>

      <label class="lbl">এলাকা/পয়েন্ট *</label>
      <input class="inp" id="area" placeholder="যেমন: কাজলা / RU"/>

      <label class="lbl">ইফতারের ধরন *</label>
      <select class="inp" id="type">
        <option value="mix">মিক্স ইফতার (বেগুনি, ছোলা, পেঁয়াজু, হালিম, শরবত)</option>
        <option value="khichuri">খিচুড়ি</option>
        <option value="biriyani">বিরিয়ানি</option>
      </select>

      <div class="hint">
        ⚠️ একই নাম + কাছাকাছি হলে ডুপ্লিকেট ব্লক হবে
      </div>

      <div class="locRow">
        <div class="coords">
          <div class="coord"><span>lat</span><input id="lat" class="inp" readonly></div>
          <div class="coord"><span>lng</span><input id="lng" class="inp" readonly></div>
        </div>
        <button class="btnSoft" id="pickMap">Map থেকে দিন</button>
      </div>

      <button class="btn" id="submitBtn">🌙 Submit (Pending)</button>
      <div class="small" id="submitMsg"></div>
    </div>
  </div>

  <!-- Footer -->
  <div class="footer">
    <span class="footChip">Developed by RU Crush and Confession</span>
    <span class="footChip">👁 Visits: <b id="visits">-</b></span>
    <span class="footChip" id="online">🟢 Online: -</span>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script type="module" src="./app.js"></script>
</body>
</html>

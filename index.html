<!doctype html>
<html lang="bn">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>রাজশাহী ইফতার</title>

  <!-- Bangla Font: Hind Siliguri -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;600;700&display=swap" rel="stylesheet">

  <!-- Leaflet CSS -->
  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
  />

  <!-- App CSS -->
  <link rel="stylesheet" href="./style.css" />
</head>

<body>

  <!-- =========================
       TOP BAR
  ========================== -->
  <header class="topbar">
    <div class="brand">🌙 রাজশাহী ইফতার</div>

    <div class="countdownPill">
      <span class="label">ইফতার বাকি</span>
      <span id="countdown" class="time">--</span>
    </div>
  </header>

  <!-- =========================
       MAP
  ========================== -->
  <div id="map"></div>

  <!-- =========================
       ADD SPOT FLOATING BUTTON
  ========================== -->
  <button
    id="addSpotBtn"
    class="addSpotBtn"
    title="স্পট যোগ করুন"
    aria-label="স্পট যোগ করুন"
  >
    ➕
  </button>

  <!-- =========================
       BOTTOM SHEET
  ========================== -->
  <section
    id="sheet"
    class="sheet"
    aria-label="আজকের সক্রিয় ইফতার"
  >
    <div
      id="sheetHandle"
      class="sheetHandle"
      aria-label="drag handle"
    ></div>

    <div class="sheetHeader">
      <div class="sheetTitle">🍽️ আজকের সক্রিয় ইফতার</div>
      <div class="sheetMeta">
        <span id="spotCount">0</span>টি
      </div>
    </div>

    <!-- List (cards render from app.js) -->
    <div id="list" class="list">
      <div class="empty">কোনো স্পট নেই</div>
    </div>
  </section>

  <!-- =========================
       SCRIPTS
  ========================== -->

  <!-- Leaflet JS -->
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <!-- App JS (Firebase + Map + Countdown + Voting + Sheet drag) -->
  <script type="module" src="./app.js"></script>

</body>
</html>

<!doctype html>
<html lang="bn">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>রাজশাহী ইফতার</title>

  <!-- Bangla Font: Hind Siliguri -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;600;700&display=swap" rel="stylesheet">

  <!-- Leaflet CSS -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

  <!-- App CSS -->
  <link rel="stylesheet" href="./style.css" />
</head>

<body>

  <!-- ✅ LOADING OVERLAY (NEW) -->
  <div id="loadingOverlay" class="loadingOverlay" aria-label="লোডিং">
    <div class="loadingCard">
      <div class="loadingIcon">🍽️</div>
      <div class="loadingTitle">রাজশাহীর ফ্রি ইফতার ম্যাপ লোড হচ্ছে…</div>
      <div class="loadingSub">দয়া করে একটু অপেক্ষা করুন</div>
      <div class="loadingBar"><span></span></div>
    </div>
  </div>

  <!-- =========================
       TOP BAR
  ========================== -->
  <header class="topbar">
    <div class="brand">🌙 রাজশাহী ইফতার</div>

    <div class="countdownPill">
      <span class="label">ইফতার বাকি</span>
      <span id="countdown" class="time">--</span>
    </div>
  </header>

  <!-- =========================
       MAP
  ========================== -->
  <div id="map"></div>

  <!-- =========================
       ADD SPOT FLOATING BUTTON
  ========================== -->
  <button
    id="addSpotBtn"
    class="addSpotBtn"
    title="স্পট যোগ করুন"
    aria-label="স্পট যোগ করুন"
  >
    ➕
  </button>

  <!-- =========================
       BOTTOM SHEET
  ========================== -->
  <section
    id="sheet"
    class="sheet"
    aria-label="আজকের সক্রিয় ইফতার"
  >
    <div
      id="sheetHandle"
      class="sheetHandle"
      aria-label="drag handle"
    ></div>

    <div class="sheetHeader">
      <div class="sheetTitle">🍽️ আজকের সক্রিয় ইফতার</div>
      <div class="sheetMeta">
        <span id="spotCount">0</span>টি
      </div>
    </div>

    <div id="list" class="list">
      <div class="empty">কোনো স্পট নেই</div>
    </div>
  </section>

  <!-- =========================
       ADD SPOT MODAL
  ========================== -->
  <div id="addSpotModal" class="modal hidden" aria-label="ইফতার স্পট যোগ করুন">
    <div class="modalCard">

      <div class="modalHeader">
        <div>
          <div class="modalTitle">📍 ইফতার স্পট যোগ করুন</div>
          <div class="modalSub">উম্মাকে ইফতার খুঁজে পেতে সাহায্য করুন</div>
        </div>
        <button id="closeModal" class="modalClose" aria-label="Close">✕</button>
      </div>

      <div class="modalBody">
        <label>স্পট / মসজিদের নাম *</label>
        <input id="spotName" placeholder="উদাহরণ: কাজলা জামে মসজিদ" />

        <label>এলাকা *</label>
        <input id="spotArea" placeholder="উদাহরণ: কাজলা, রাজশাহী" />

        <div class="pinRow">
          <div id="pickedLatLng" class="pinText">📍 ম্যাপ থেকে লোকেশন দিন</div>
          <button id="pickLocationBtn" class="pinBtn">ম্যাপ থেকে দিন</button>
        </div>

        <button id="submitSpotBtn" class="submitBtn">স্পট যোগ করুন</button>
      </div>

    </div>
  </div>

  <!-- =========================
       SCRIPTS
  ========================== -->
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script type="module" src="./app.js"></script>

</body>
</html>
